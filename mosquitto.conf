# Mosquitto MQTT Broker Configuration
# Smart Billing + Motor Control IoT System
# -----------------------------------------
# Place this file at /etc/mosquitto/conf.d/smart_billing.conf
# or run: mosquitto -c mosquitto.conf

# ─── Persistence ──────────────────────────────────────
persistence true
persistence_location /var/lib/mosquitto/

# ─── Logging ──────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ─── Listener 1: Standard TCP (ESP32 + Pi scripts) ────
listener 1883
protocol mqtt
allow_anonymous true

# ─── Listener 2: WebSocket (Web Dashboard browser) ────
listener 9001
protocol websockets
allow_anonymous true

# ─── Retained messages ────────────────────────────────
# The broker retains the last message on these topics
# so the dashboard gets current state on connect.
# (Retention is set by publishers using retain=True)
